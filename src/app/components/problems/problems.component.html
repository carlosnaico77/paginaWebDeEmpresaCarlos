<section class="problems glass-section">
  <div class="container">
    <div class="problems-layout">
      <div class="problems-text" data-aos="fade-up">
        <span class="section-tag tag-warning">{{ 'PROBLEMS.TAG' | translate }}</span>
        <h2 class="section-title">{{ 'PROBLEMS.TITLE' | translate }}</h2>
        
        <div class="problems-list">
          <div class="problem-item">
            <span class="icon-warning"></span>
            <p>{{ 'PROBLEMS.P1' | translate }}</p>
          </div>
          <div class="problem-item">
            <span class="icon-warning"></span>
            <p>{{ 'PROBLEMS.P2' | translate }}</p>
          </div>
          <div class="problem-item">
            <span class="icon-warning"></span>
            <p>{{ 'PROBLEMS.P3' | translate }}</p>
          </div>
        </div>
        
        <a href="#contacto" class="btn-primary">{{ 'PROBLEMS.CTA' | translate }}</a>
      </div>
      
      <div class="problems-visual" data-aos="zoom-in">
        <!-- Visual representativo de caos/desorden digital -->
        <div class="abstract-shape shape-1"></div>
        <div class="abstract-shape shape-2"></div>
      </div>
    </div>
  </div>
</section>
