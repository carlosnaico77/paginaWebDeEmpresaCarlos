<section id="inicio" class="hero">
  <div class="hero-content">
    <span class="section-tag" data-aos="fade-up">{{ 'HERO.TAG' | translate }}</span>
    <h1 class="hero-title" data-aos="fade-up" data-aos-delay="100">
      {{ 'HERO.TITLE' | translate }} <br>
      <span class="gradient-text">{{ 'HERO.TITLE_ACCENT' | translate }}</span> <br>
      {{ 'HERO.SUBTITLE' | translate }}
    </h1>
    <p class="hero-description" data-aos="fade-up" data-aos-delay="200">
      {{ 'HERO.DESC' | translate }}
    </p>
    <div class="hero-actions" data-aos="fade-up" data-aos-delay="300">
      <a href="#contacto" class="btn-primary">{{ 'HERO.CTA_START' | translate }}</a>
      <a href="#proyectos" class="btn-secondary">{{ 'HERO.CTA_PORTFOLIO' | translate }}</a>
    </div>
  </div>
  
  <div class="hero-visual">
     <div class="glow-sphere"></div>
  </div>
</section>
