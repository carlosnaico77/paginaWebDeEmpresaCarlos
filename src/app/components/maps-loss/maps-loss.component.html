<section class="maps-loss">
  <div class="container">
    <div class="maps-grid">
      <div class="maps-visual" data-aos="fade-right">
        <div class="map-mockup glass">
          <div class="pin"></div>
          <div class="pin-ghost"></div>
        </div>
      </div>
      
      <div class="maps-content" data-aos="fade-left">
        <h2 class="section-title text-danger">{{ 'MAPS_LOSS.TITLE' | translate }}</h2>
        <p class="section-description">{{ 'MAPS_LOSS.DESC' | translate }}</p>
        <div class="stats-box glass">
          <span class="stats-text">{{ 'MAPS_LOSS.STATS' | translate }}</span>
        </div>
        <a href="#contacto" class="btn-primary mt-4">{{ 'SERVICES_DETAIL.CTA' | translate }}</a>
      </div>
    </div>
  </div>
</section>
