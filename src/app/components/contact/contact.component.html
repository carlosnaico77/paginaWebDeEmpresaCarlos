<section id="contacto" class="contact">
  <div class="container glass">
    <div class="contact-header">
      <span class="section-tag">{{ 'CONTACT.TAG' | translate }}</span>
      <h2 class="section-title">{{ 'CONTACT.TITLE' | translate }}</h2>
      <p class="section-description">{{ 'CONTACT.DESC' | translate }}</p>
    </div>
    
    <form class="contact-form" (submit)="onSubmit($event)">
      <div class="form-group">
        <label for="name">{{ 'CONTACT.L_NAME' | translate }}</label>
        <input type="text" id="name" name="name" [placeholder]="'CONTACT.P_NAME' | translate" required>
      </div>
      <div class="form-group">
        <label for="email">{{ 'CONTACT.L_EMAIL' | translate }}</label>
        <input type="email" id="email" name="email" [placeholder]="'CONTACT.P_EMAIL' | translate" required>
      </div>
      <div class="form-group">
        <label for="service">{{ 'CONTACT.L_SERVICE' | translate }}</label>
        <select id="service" name="service">
          <option value="web">{{ 'CONTACT.S_WEB' | translate }}</option>
          <option value="ecommerce">{{ 'CONTACT.S_ECOM' | translate }}</option>
          <option value="software">{{ 'CONTACT.S_SOFT' | translate }}</option>
          <option value="apps">{{ 'CONTACT.S_APPS' | translate }}</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">{{ 'CONTACT.L_MESSAGE' | translate }}</label>
        <textarea id="message" name="message" rows="4" [placeholder]="'CONTACT.P_MESSAGE' | translate"></textarea>
      </div>
      <button type="submit" class="btn-primary">{{ 'CONTACT.CTA_SEND' | translate }}</button>
    </form>
  </div>
</section>
