<section id="quienes-somos" class="about">
  <div class="container">
    <div class="about-grid">
      <div class="about-image" data-aos="fade-right">
        <div class="image-wrapper">
          <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" [alt]="'ABOUT.IMAGE_DESC' | translate">
          <div class="experience-badge">
            <span class="badge-num">10+</span>
            <span class="badge-text">Years XP</span>
          </div>
        </div>
      </div>
      
      <div class="about-content" data-aos="fade-left">
        <span class="section-tag">{{ 'ABOUT.TAG' | translate }}</span>
        <h2 class="section-title">{{ 'ABOUT.TITLE' | translate }}</h2>
        <p class="section-description">{{ 'ABOUT.DESC' | translate }}</p>
        
        <div class="about-stats">
          <div class="stat-item">
            <span class="stat-num">50+</span>
            <span class="stat-label">Clients</span>
          </div>
          <div class="stat-item">
            <span class="stat-num">100+</span>
            <span class="stat-label">Projects</span>
          </div>
        </div>
        
        <a href="#contacto" class="btn-primary">{{ 'ABOUT.CTA' | translate }}</a>
      </div>
    </div>
  </div>
</section>
