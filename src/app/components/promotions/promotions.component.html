<section class="promotions">
  <div class="container">
    <div class="promo-banner glass" data-aos="zoom-in">
      <div class="promo-content">
        <span class="promo-badge">{{ 'PROMO.MONTH' | translate }}</span>
        <h2 class="promo-title">{{ 'PROMO.TITLE' | translate }}</h2>
        <p class="promo-description" [innerHTML]="'PROMO.DESC' | translate"></p>
        <a href="#contacto" class="btn-primary">{{ 'PROMO.CTA' | translate }}</a>
      </div>
      <div class="promo-icon">🎁</div>
    </div>
  </div>
</section>
